<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Velita</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@300;400;600&family=Parisienne&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:#4B3528;
    color:#E9DFD3;
    font-family:'Manrope',sans-serif;

    display:flex;
    justify-content:center;
    align-items:center;

    height:100vh;
    text-align:center;
}

.container{
    max-width:700px;
    padding:30px;
}

h1{
    font-family:'Parisienne',cursive;
    font-size:110px;
    font-weight:400;
    margin-bottom:15px;
}

.subtitle{
    letter-spacing:6px;
    font-size:18px;
    margin-bottom:50px;
}

.line{
    width:70px;
    height:1px;
    background:#E9DFD3;
    margin:0 auto 50px;
    opacity:.8;
}

h2{
    font-size:44px;
    font-weight:300;
    letter-spacing:8px;
    margin-bottom:30px;
}

p{
    font-size:20px;
    line-height:1.8;
    opacity:.9;
}

.contact{
    margin-top:40px;
    font-size:18px;
}

.contact a{
    color:#E9DFD3;
    text-decoration:none;
}

.instagram{
    margin-top:30px;
}

.instagram a{
    color:#E9DFD3;
    text-decoration:none;
    font-size:20px;
    transition:.2s;
}

.instagram a:hover,
.contact a:hover{
    opacity:.7;
}

.footer{
    margin-top:50px;
    font-size:15px;
    opacity:.6;
}

</style>

</head>

<body>

<div class="container">

<h1>Velita</h1>

<div class="subtitle">APP DEVELOPMENT</div>

<div class="line"></div>

<h2>COMING SOON</h2>

<p>
Velita develops beautifully designed mobile applications
that help simplify everyday life.
</p>

<div class="contact">
Contact: <a href="mailto:hello@velita.co">hello@velita.co</a>
</div>

<div class="instagram">
<a href="https://instagram.com/velita_apps">
@velita_apps
</a>
</div>

<div class="footer">
© 2026 Velita. All rights reserved.
</div>

</div>

</body>

</html>
